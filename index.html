<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Launcher HTML mở app trực tiếp</title>
    <style>
        /* Giữ nguyên phong cách launcher tối giản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', system-ui, sans-serif;
        }
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .launcher {
            max-width: 480px;
            width: 100%;
            background: #1e1e1e;
            border-radius: 32px 32px 20px 20px;
            box-shadow: 0 20px 40px black, 0 0 0 1px #3a3a3a inset;
            padding: 24px 16px 28px;
            border: 1px solid #2c2c2c;
        }
        .search-placeholder {
            background: #2a2a2a;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
            border: 1px solid #3b3b3b;
            color: #aaa;
            font-size: 15px;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px 16px;
            justify-items: center;
            margin-bottom: 32px;
        }
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .app-item:active {
            transform: scale(0.94);
        }
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(145deg, #2d2d2d, #1b1b1b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05) inset;
            margin-bottom: 8px;
            color: white;
        }
        /* Màu đặc trưng cho từng app (giữ như cũ) */
        .app-item[data-pkg="com.android.vending"] .app-icon { background: linear-gradient(145deg, #3d9c5c, #1e7b3e); }
        .app-item[data-pkg="com.android.settings"] .app-icon { background: linear-gradient(145deg, #5f5f5f, #3e3e3e); }
        .app-item[data-pkg="com.google.android.youtube"] .app-icon { background: linear-gradient(145deg, #ff4e4e, #c21818); }
        .app-item[data-pkg="com.android.dialer"] .app-icon { background: linear-gradient(145deg, #1e8f5c, #0d5e3a); }
        .app-item[data-pkg="com.android.messaging"] .app-icon { background: linear-gradient(145deg, #2979ff, #0a4baf); }
        .app-item[data-pkg="com.android.launcher3"] .app-icon { background: linear-gradient(145deg, #9b64c0, #673f8b); }

        .app-name {
            font-size: 13px;
            font-weight: 500;
            color: #eee;
            text-align: center;
            max-width: 80px;
            text-shadow: 0 1px 2px black;
        }
        .dock {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #333;
            padding-top: 18px;
            margin-top: 4px;
        }
        .dock-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: #232323;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 6px 8px black;
            border: 1px solid #3a3a3a;
            cursor: pointer;
            transition: 0.1s;
        }
        .dock-icon:active {
            transform: scale(0.92);
            background: #2e2e2e;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            color: #888;
            font-size: 20px;
        }
    </style>
</head>
<body>
<div class="launcher">
    <!-- thanh tìm kiếm giả định -->
    <div class="search-placeholder">
        <span>🔍</span>
        <span>Tìm kiếm...</span>
        <span style="margin-left: auto;">🎤</span>
    </div>

    <!-- lưới ứng dụng chính với data-pkg chứa package name -->
    <div class="apps-grid" id="appsGrid">
        <div class="app-item" data-pkg="com.android.vending">
            <div class="app-icon">🛒</div>
            <span class="app-name">Play Store</span>
        </div>
        <div class="app-item" data-pkg="com.android.settings">
            <div class="app-icon">⚙️</div>
            <span class="app-name">Cài đặt</span>
        </div>
        <div class="app-item" data-pkg="com.google.android.youtube">
            <div class="app-icon">▶️</div>
            <span class="app-name">YouTube</span>
        </div>
        <div class="app-item" data-pkg="com.android.dialer">
            <div class="app-icon">📞</div>
            <span class="app-name">Điện thoại</span>
        </div>
        <div class="app-item" data-pkg="com.android.messaging">
            <div class="app-icon">✉️</div>
            <span class="app-name">Nhắn tin</span>
        </div>
        <div class="app-item" data-pkg="com.android.launcher3">
            <div class="app-icon">🏠</div>
            <span class="app-name">Launcher3</span>
        </div>
    </div>

    <!-- dock với vài app phổ biến -->
    <div class="dock">
        <div class="dock-icon" data-pkg="com.android.dialer">📞</div>
        <div class="dock-icon" data-pkg="com.android.messaging">✉️</div>
        <div class="dock-icon" data-pkg="com.android.vending">🛒</div>
        <div class="dock-icon" data-pkg="com.google.android.youtube">▶️</div>
    </div>

    <!-- thanh điều hướng giả -->
    <div class="nav-bar">
        <span>◀</span>
        <span>●</span>
        <span>◻</span>
    </div>
</div>

<script>
    (function() {
        // Hàm mở ứng dụng trực tiếp bằng intent (ưu tiên) và fallback
        function openApp(packageName) {
            if (!packageName) return;

            // 1. Dùng intent:// scheme (hoạt động tốt trên Chrome Android khi có app)
            const intentUrl = `intent://${packageName}#Intent;scheme=package;action=android.intent.action.VIEW;end`;

            // 2. Dùng market:// nhưng để mở app, không phải play store (thực tế market cũng có thể fallback)
            // Nhưng một số thiết bị có thể hiểu package:// hoặc app://
            // 3. Fallback an toàn: dùng intent với fallback URL nếu không có app (có thể đưa về play store)
            // Nhưng ở đây ta muốn mở app ngay, không fallback nếu thiếu app (sẽ báo lỗi nhẹ nhàng)

            // Tạo một thẻ <a> ẩn để kích hoạt intent
            const anchor = document.createElement('a');
            anchor.href = intentUrl;
            anchor.style.display = 'none';
            document.body.appendChild(anchor);

            // Mô phỏng click
            anchor.click();

            // Dọn dẹp sau 500ms
            setTimeout(() => {
                document.body.removeChild(anchor);
            }, 500);

            // Ghi chú: trên các trình duyệt desktop hoặc không hỗ trợ intent, sẽ không có tác dụng.
            // Nhưng trên điện thoại Android với Chrome, nó sẽ hiển thị hộp thoại chọn app hoặc mở thẳng.
            // Nếu không có app nào xử lý, có thể không phản hồi.
        }

        // Gắn sự kiện cho tất cả app-item
        const appItems = document.querySelectorAll('.app-item, .dock-icon');
        appItems.forEach(item => {
            item.addEventListener('click', function(e) {
                const pkg = this.getAttribute('data-pkg');
                if (pkg) {
                    openApp(pkg);
                }
            });
        });

        // Thêm hiệu ứng chạm nhẹ nhàng (CSS đã có active)
        console.log('Launcher đã sẵn sàng. Nhấn vào icon để mở ứng dụng trực tiếp!');
    })();
</script>

<!-- Lưu ý: 
     - Để tính năng mở app hoạt động, bạn cần mở trang này trên trình duyệt Android (Chrome, Firefox...)
     - Intent URL có dạng: intent://<package>#Intent;scheme=package;action=android.intent.action.VIEW;end
     - Nếu thiết bị có app tương ứng với package, nó sẽ mở thẳng. Nếu không, có thể không phản hồi hoặc báo lỗi.
     - Một số launcher tùy chỉnh có thể chặn intent, nhưng hầu hết đều hoạt động.
-->
</body>
</html>
