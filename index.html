<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Launcher Android CHUẨN - Mở app trực tiếp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        
        .launcher {
            max-width: 480px;
            width: 100%;
            background: #1e1e1e;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            padding: 24px 16px 28px;
            border: 1px solid #2c2c2c;
        }
        
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px 12px;
            justify-items: center;
            margin-bottom: 32px;
        }
        
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.1s ease;
            padding: 8px 4px;
            border-radius: 20px;
        }
        
        .app-item:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.1);
        }
        
        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.6);
            margin-bottom: 10px;
            color: white;
        }
        
        /* Màu app */
        .app-item[data-package="com.android.vending"] .app-icon { background: #3d9c5c; }
        .app-item[data-package="com.android.settings"] .app-icon { background: #616161; }
        .app-item[data-package="com.google.android.youtube"] .app-icon { background: #FF0000; }
        .app-item[data-package="com.android.dialer"] .app-icon { background: #4CAF50; }
        .app-item[data-package="com.android.messaging"] .app-icon { background: #2196F3; }
        .app-item[data-package="com.android.launcher3"] .app-icon { background: #9C27B0; }
        
        .app-name {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            text-align: center;
        }
        
        .dock {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        
        .dock-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 6px 8px rgba(0,0,0,0.6);
            border: 1px solid #3a3a3a;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .dock-icon:active {
            transform: scale(0.92);
            background: #333;
        }
        
        #status {
            background: #2a2a2a;
            color: #4CAF50;
            padding: 12px;
            border-radius: 30px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #3a3a3a;
        }
        
        .warning {
            color: #ff9800;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 12px;
            border-left: 4px solid #ff9800;
        }
    </style>
</head>
<body>
    <div class="launcher">
        <div id="status">
            📱 Launcher Android - Mở app trực tiếp
        </div>
        
        <div class="apps-grid">
            <div class="app-item" data-package="com.android.vending">
                <div class="app-icon">🛒</div>
                <span class="app-name">Play Store</span>
            </div>
            <div class="app-item" data-package="com.android.settings">
                <div class="app-icon">⚙️</div>
                <span class="app-name">Cài đặt</span>
            </div>
            <div class="app-item" data-package="com.google.android.youtube">
                <div class="app-icon">▶️</div>
                <span class="app-name">YouTube</span>
            </div>
            <div class="app-item" data-package="com.android.dialer">
                <div class="app-icon">📞</div>
                <span class="app-name">Điện thoại</span>
            </div>
            <div class="app-item" data-package="com.android.messaging">
                <div class="app-icon">✉️</div>
                <span class="app-name">Nhắn tin</span>
            </div>
            <div class="app-item" data-package="com.android.launcher3">
                <div class="app-icon">🏠</div>
                <span class="app-name">Launcher3</span>
            </div>
        </div>
        
        <div class="dock">
            <div class="dock-icon" data-package="com.android.dialer">📞</div>
            <div class="dock-icon" data-package="com.android.messaging">✉️</div>
            <div class="dock-icon" data-package="com.android.vending">🛒</div>
            <div class="dock-icon" data-package="com.google.android.youtube">▶️</div>
        </div>
        
        <div class="warning" id="warning">
            ⚠ Đang kiểm tra thiết bị...
        </div>
    </div>

    <script>
        (function() {
            const warning = document.getElementById('warning');
            const isAndroid = /Android/i.test(navigator.userAgent);
            
            if (isAndroid) {
                warning.innerHTML = '✅ Đang ở chế độ LAUNCHER - Nhấn vào icon để MỞ ỨNG DỤNG trực tiếp';
                warning.style.color = '#4CAF50';
                warning.style.borderLeftColor = '#4CAF50';
            } else {
                warning.innerHTML = '❌ Bạn đang dùng máy tính/iOS - Tính năng mở app chỉ hoạt động trên Android';
                warning.style.color = '#f44336';
                warning.style.borderLeftColor = '#f44336';
            }
            
            function openAppDirectly(packageName) {
                if (!packageName) return;
                
                console.log('MỞ APP:', packageName);
                
                // CÁCH 1: Intent để MỞ APP TRỰC TIẾP (chuẩn nhất)
                // Sử dụng action MAIN để launch app, không phải VIEW
                const intentUrl = `intent://${packageName}#Intent;scheme=package;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end`;
                
                // CÁCH 2: Dùng package: scheme (cũng mở app trực tiếp)
                const packageUrl = `package:${packageName}`;
                
                // CÁCH 3: Dùng app:// scheme
                const appUrl = `app://${packageName}`;
                
                if (isAndroid) {
                    // Thử từng cách một
                    
                    // Cách 1: Intent với iframe (hiệu quả nhất)
                    try {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = intentUrl;
                        document.body.appendChild(iframe);
                        
                        setTimeout(() => {
                            document.body.removeChild(iframe);
                        }, 100);
                        
                        // Thông báo thành công
                        warning.innerHTML = `✅ Đang mở: ${packageName}`;
                        warning.style.color = '#4CAF50';
                    } catch (e) {
                        console.log('Cách 1 thất bại, thử cách 2');
                        
                        // Cách 2: Dùng location.href với package:
                        try {
                            window.location.href = packageUrl;
                        } catch (e2) {
                            console.log('Cách 2 thất bại, thử cách 3');
                            
                            // Cách 3: Dùng app:
                            try {
                                window.location.href = appUrl;
                            } catch (e3) {
                                warning.innerHTML = `❌ Không thể mở ${packageName}`;
                                warning.style.color = '#f44336';
                            }
                        }
                    }
                } else {
                    // Không phải Android thì báo lỗi
                    warning.innerHTML = '❌ Chỉ mở được app trên điện thoại Android';
                    warning.style.color = '#f44336';
                }
            }
            
            // Gán sự kiện click
            const elements = document.querySelectorAll('[data-package]');
            elements.forEach(el => {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const pkg = this.getAttribute('data-package');
                    
                    // Hiệu ứng click
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 100);
                    
                    // Mở app
                    openAppDirectly(pkg);
                    
                    return false;
                });
            });
            
            // Test thử với package có sẵn để kiểm tra
            console.log('Launcher đã sẵn sàng! Các package có thể mở:');
            console.log('- com.android.vending (Play Store)');
            console.log('- com.android.settings (Settings)');
            console.log('- com.google.android.youtube (YouTube)');
            console.log('- com.android.dialer (Điện thoại)');
            console.log('- com.android.messaging (Nhắn tin)');
            console.log('- com.android.launcher3 (Launcher3)');
        })();
    </script>
</body>
</html>
